services:
  backend:
    build:
      context: ./MindMap.Backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5289
      ConnectionStrings__DefaultConnection: Data Source=/app/data/mindmap.db
    ports:
      - "5289:5289"
    volumes:
      - mindmap_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./MindMap.Frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  mindmap_data:
